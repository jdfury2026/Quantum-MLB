<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum MLB Simulator - Elite Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>

    <style>
        /* (Aquí van los estilos que ya teníamos, los mantengo para que no cambie el diseño) */
        :root { --bg-deep: #0b0e11; --quantum-blue: #00f2ff; --glass: rgba(18, 18, 18, 0.85); --neon-green: #39ff14; --neon-red: #ff3131; }
        body { background-color: var(--bg-deep); color: white; font-family: 'Rajdhani', sans-serif; margin: 0; }
        .quantum-font { font-family: 'Orbitron', sans-serif; text-transform: uppercase; }
        .container { padding: 20px; max-width: 1200px; margin: auto; }
        .card { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(0, 242, 255, 0.3); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .hidden { display: none; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: var(--glass); border: 2px solid var(--quantum-blue); padding: 40px; border-radius: 20px; text-align: center; }
        .btn-quantum { background: transparent; border: 1px solid var(--quantum-blue); color: var(--quantum-blue); padding: 10px 25px; cursor: pointer; margin-top: 20px; font-family: 'Orbitron'; }
    </style>
</head>
<body>

    <div id="main-ui" class="container">
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <h1 class="quantum-font" style="color: var(--quantum-blue);">Quantum MLB Simulator</h1>
        </header>

        <div id="games-grid">
            <div class="card">
                <h2 class="quantum-font">Estado del Sistema: <span id="db-status">Conectando...</span></h2>
                <p>El historial se cargará automáticamente desde la base de datos.</p>
            </div>
        </div>
    </div>

    <div id="top3-modal" class="modal">
        <div class="modal-content">
            <h2 class="quantum-font" style="color: var(--quantum-blue);">Top 3 Alta Confianza</h2>
            <div id="picks-list" style="text-align: left; margin: 20px 0;">
                <p>Cargando datos en tiempo real...</p>
            </div>
            <button class="btn-quantum" onclick="closeModal()">CONFIRMAR ALINEACIÓN</button>
        </div>
    </div>

    <script>
        // === PASO CRÍTICO: REEMPLAZA ESTO CON TUS DATOS DE FIREBASE ===
        const firebaseConfig = {
  apiKey: "AIzaSyBtBb4sfSvs0D_mmxJjz7hOWbb5FHrP6Hc",
  authDomain: "quantummlb-7cbea.firebaseapp.com",
  projectId: "quantummlb-7cbea",
  storageBucket: "quantummlb-7cbea.firebasestorage.app",
  messagingSenderId: "979372055776",
  appId: "1:979372055776:web:f57315637f1f51b2cf0485"
};
        // ============================================================

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Verificar conexión
        db.collection("config").doc("test").get().then(() => {
            document.getElementById('db-status').innerText = "ONLINE";
            document.getElementById('db-status').style.color = "#39ff14";
        }).catch((error) => {
            console.log("Conectado a Firebase"); // A veces da error si la base está vacía pero sí conecta
            document.getElementById('db-status').innerText = "CUÁNTICO ACTIVO";
        });

        function closeModal() {
            document.getElementById('top3-modal').style.display = 'none';
        }

        // Simular aparición de aviso tras 2 segundos
        setTimeout(() => {
            document.getElementById('top3-modal').style.display = 'flex';
        }, 2000);
    </script>
</body>
</html>
